- id: GHA-026
  title: "Cloud deployments SHOULD use OIDC federation instead of static credentials"
  desc: >
    Storing long-lived cloud credentials (AWS_ACCESS_KEY_ID, AZURE_CREDENTIALS,
    GCP_SA_KEY) as GitHub Secrets creates persistent credential exposure risk.
    OIDC federation (id-token: write) provides short-lived, automatically
    rotated credentials scoped to specific workflows.
  check: >
    Verify that workflows referencing common cloud credential secret names
    also include id-token: write in their permissions block, indicating
    OIDC federation is configured.
  fix: >
    Configure OIDC federation with your cloud provider:
    AWS: configure-aws-credentials with role-to-assume
    Azure: azure/login with OIDC
    GCP: auth with workload_identity_provider
    Remove static credential secrets after migration.
  impact: 0.5
  severity: medium
  cci:
    - CCI-000225  # AC-6: Least Privilege
    - CCI-000196  # IA-5(1): Authenticator Management
  nist:
    - AC-6
    - IA-5 (1)
  owasp_cicd: CICD-SEC-6
  classifier: classify_static_credentials
  implemented: false
  card: wzi

- id: GHA-027
  title: "Organization SHOULD enforce SHA pinning for actions"
  desc: >
    The sha_pinning_required org setting (added August 2025) enforces that
    all action references use SHA pinning. When enabled, workflows using
    mutable tags are rejected. This provides organization-wide protection
    against tag-override supply chain attacks.
  check: >
    Verify via gh api orgs/<ORG>/actions/permissions that
    sha_pinning_required is true.
  fix: >
    Enable SHA pinning enforcement in org settings. Ensure all existing
    workflows are updated to use SHA-pinned action references before
    enabling, or they will fail.
  impact: 0.5
  severity: medium
  cci:
    - CCI-002706  # SI-7(1): Integrity Checks
    - CCI-000366  # CM-6: Configuration Settings
  nist:
    - SI-7 (1)
    - CM-6
  owasp_cicd: CICD-SEC-3
  classifier: org_sha_pinning
  implemented: false
