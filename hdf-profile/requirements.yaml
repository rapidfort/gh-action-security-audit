- id: GHA-029
  title: "Organization secrets SHOULD be scoped to selected repositories, not all"
  desc: >
    Org secrets with visibility set to 'all' are available to every repository
    in the organization, violating the principle of least privilege. If any
    repository is compromised, the attacker gains access to all org secrets.
    Scoping secrets to only the repositories that need them limits blast radius.
  check: >
    Verify that no org-level secret has visibility set to 'all'. All org
    secrets should use 'selected' (with an explicit repo list) or 'private'.
  fix: >
    Scope each org secret to only the repositories that reference it:
    gh secret set SECRET_NAME --org ORG --visibility selected --repos repo1,repo2
    Use the remediation commands in the org secrets table.
  impact: 0.5
  severity: medium
  cci:
    - CCI-000225  # AC-6: Least Privilege
    - CCI-000183  # IA-5: Protect authenticators
  nist:
    - AC-6
    - IA-5
  owasp_cicd: CICD-SEC-6
  classifier: org_secret_scoping
  implemented: true

- id: GHA-028
  title: "Organization SHOULD restrict which repositories can use GitHub Actions"
  desc: >
    The enabled_repositories org setting controls which repositories can
    use GitHub Actions (all, none, or selected). Allowing all repositories
    increases the attack surface, especially if some repos are public or
    less actively maintained.
  check: >
    Verify via gh api orgs/<ORG>/actions/permissions that
    enabled_repositories is set to 'selected' (not 'all').
  fix: >
    Restrict Actions to selected repositories: Settings → Actions →
    General → Policies → select 'Enable for select repositories'.
    Add only repositories that need CI/CD workflows.
  impact: 0.5
  severity: medium
  cci:
    - CCI-000381  # CM-7: Least Functionality
  nist:
    - CM-7
  owasp_cicd: CICD-SEC-1
  classifier: org_enabled_repositories
  implemented: false
  card: 4yh
