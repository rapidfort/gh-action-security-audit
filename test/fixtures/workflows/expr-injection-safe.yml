name: Safe Expressions
on:
  pull_request_target:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ github.repository }}"
      - run: echo "${{ github.sha }}"
      - run: echo "${{ github.ref }}"
      - run: echo "${{ github.event.pull_request.number }}"
